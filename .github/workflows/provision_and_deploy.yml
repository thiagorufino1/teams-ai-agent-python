name: Provision and Deploy (Corporate)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  provision-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Azure Service Principal
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_RESOURCE_GROUP_NAME: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}
      
      # Secrets do Agente
      SECRET_AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Teams Toolkit CLI
        run: npm install -g @microsoft/teamsapp-cli

      - name: Login to Azure (Service Principal)
        run: |
          teamsapp account login azure --service-principal \
            --tenant ${{ env.AZURE_TENANT_ID }} \
            --username ${{ env.AZURE_CLIENT_ID }} \
            --password ${{ env.AZURE_CLIENT_SECRET }} \
            --interactive false

      - name: Provision Resources (Dev)
        run: teamsapp provision --env dev --interactive false

      - name: Deploy Application (Dev)
        run: teamsapp deploy --env dev --interactive false
