name: Provision and Deploy (Corporate)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  provision-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Apenas Azure Service Principal (Suporta ambientes corporativos com MFA)
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_RESOURCE_GROUP_NAME: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}
      
      # Secrets do Agente
      SECRET_AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Teams Toolkit CLI
        run: npm install -g @microsoft/teamsfx-cli

      - name: Login to Azure (Service Principal)
        run: |
          teamsfx account login azure --service-principal \
            --tenant ${{ env.AZURE_TENANT_ID }} \
            --username ${{ env.AZURE_CLIENT_ID }} \
            --password ${{ env.AZURE_CLIENT_SECRET }}

      # NOTA: O 'provision' aqui vai executar apenas as etapas de infraestrutura (Bicep) 
      # e pular as que exigem M365 se você já tiver o TEAMS_APP_ID configurado.
      - name: Provision Resources (Dev)
        run: teamsfx provision --env dev

      - name: Deploy Application (Dev)
        run: teamsfx deploy --env dev
