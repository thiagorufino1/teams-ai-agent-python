name: Provision and Deploy

on:
  workflow_dispatch: # Permite rodar manualmente
  push:
    branches:
      - main # Roda ao fazer push na main

jobs:
  provision-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Essas variáveis devem ser configuradas nos Secrets do GitHub
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_RESOURCE_GROUP_NAME: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}
      
      # M365 Account (Necessário para o 'provision' do Teams App)
      M365_ACCOUNT_NAME: ${{ secrets.M365_ACCOUNT_NAME }}
      M365_ACCOUNT_PASSWORD: ${{ secrets.M365_ACCOUNT_PASSWORD }}
      
      # Secrets do Agente (para serem injetados no Azure App Service)
      SECRET_AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
      AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION || '2024-12-01-preview' }}

      # Configurações do Agente
      M365_AGENT_FEEDBACK_LOOP: true
      M365_AGENT_AI_LABEL: true
      M365_AGENT_SENSITIVITY_NAME: Internal
      M365_AGENT_SENSITIVITY_TYPE: https://schema.org/Message
      M365_AGENT_SENSITIVITY_SCHEMA_TYPE: CreativeWork
      M365_AGENT_MAX_HISTORY_TURNS: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Teams Toolkit CLI
        run: npm install -g @microsoft/teamsfx-cli

      - name: Login to Azure
        run: |
          teamsfx account login azure --service-principal \
            --tenant ${{ env.AZURE_TENANT_ID }} \
            --username ${{ env.AZURE_CLIENT_ID }} \
            --password ${{ env.AZURE_CLIENT_SECRET }}

      - name: Login to M365
        run: |
          teamsfx account login m365 \
            --username ${{ env.M365_ACCOUNT_NAME }} \
            --password ${{ env.M365_ACCOUNT_PASSWORD }}

      - name: Provision Resources (Dev)
        run: teamsfx provision --env dev

      - name: Deploy Application (Dev)
        run: teamsfx deploy --env dev
