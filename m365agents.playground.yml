# yaml-language-server: $schema=https://aka.ms/m365-agents-toolkits/v1.8/yaml.schema.json
# Visit https://aka.ms/teamsfx-v5.0-guide for details on this file
# Visit https://aka.ms/teamsfx-actions for details on actions
version: v1.8

deploy:
  # Install development tool(s)
  - uses: devTool/install
    with:
      testTool:
        version: ~0.2.7
        symlinkDir: ./devTools/playground
      nodejs:
        symlinkDir: ./devTools/nodejs

  # Generate runtime environment variables
  - uses: file/createOrUpdateEnvironmentFile
    with:
      target: ./.env
      envs:
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__CLIENTID: ""
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__CLIENTSECRET: ""
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__TENANTID: ""
        CONNECTIONS__SERVICE_CONNECTION__SETTINGS__ANONYMOUS_ALLOWED: "True"
        AZURE_OPENAI_API_KEY: ${{SECRET_AZURE_OPENAI_API_KEY}}
        AZURE_OPENAI_DEPLOYMENT_NAME: ${{AZURE_OPENAI_DEPLOYMENT_NAME}}
        AZURE_OPENAI_ENDPOINT: ${{AZURE_OPENAI_ENDPOINT}}
        AZURE_OPENAI_API_VERSION: ${{AZURE_OPENAI_API_VERSION}}
        M365_AGENT_FEEDBACK_LOOP: ${{M365_AGENT_FEEDBACK_LOOP}}
        M365_AGENT_AI_LABEL: ${{M365_AGENT_AI_LABEL}}
        M365_AGENT_SENSITIVITY_NAME: ${{M365_AGENT_SENSITIVITY_NAME}}
        M365_AGENT_SENSITIVITY_TYPE: ${{M365_AGENT_SENSITIVITY_TYPE}}
        M365_AGENT_SENSITIVITY_SCHEMA_TYPE: ${{M365_AGENT_SENSITIVITY_SCHEMA_TYPE}}
        M365_AGENT_MAX_HISTORY_TURNS: ${{M365_AGENT_MAX_HISTORY_TURNS}}
